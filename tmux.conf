# ------------------------------------------------------------
# TERMINAL SETTINGS
# ------------------------------------------------------------

# Set tmux to use 256 color terminal
set -g default-terminal "tmux-256color"

# Enable true color support for terminals like xterm
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support (pane resize, pane select, scroll)
set -g mouse on


# ------------------------------------------------------------
# PREFIX CONFIGURATION
# ------------------------------------------------------------

# Unbind the default prefix Ctrl+b
unbind C-b

# Set new prefix to Ctrl+Space
set -g prefix C-Space

# Allow sending prefix to nested tmux sessions
bind C-Space send-prefix


# ------------------------------------------------------------
# WINDOW NAVIGATION
# ------------------------------------------------------------

# Alt + H → go to previous window
bind -n M-H previous-window

# Alt + L → go to next window
bind -n M-L next-window


# ------------------------------------------------------------
# SESSION NAVIGATION
# ------------------------------------------------------------

# Prefix + Ctrl+h → switch to previous session
# bind C-h switch-client -p

# Prefix + Ctrl+l → switch to next session
# bind C-l switch-client -n

# Prefix + s → interactive session list
# lets you pick sessions with arrow keys
bind s choose-tree -s


# ------------------------------------------------------------
# WINDOW / PANE INDEXING
# ------------------------------------------------------------

# Start window numbering at 1 instead of 0
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Ensure panes follow the same base index
set-window-option -g pane-base-index 1

# Automatically renumber windows when one closes
set-option -g renumber-windows on


# ------------------------------------------------------------
# PANE SPLITTING
# ------------------------------------------------------------

# Split vertically and keep same working directory
bind "_" split-window -v -c "#{pane_current_path}"

# Split horizontally and keep same working directory
bind "|" split-window -h -c "#{pane_current_path}"


# ------------------------------------------------------------
# COPY MODE (VIM STYLE)
# ------------------------------------------------------------

# Use vim-style keybindings in copy mode
set-window-option -g mode-keys vi

# v → start selection
bind-key -T copy-mode-vi v send -X begin-selection

# Ctrl+v → rectangular selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# y → copy selection and exit copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


# ------------------------------------------------------------
# THEME
# ------------------------------------------------------------

# Catppuccin theme flavour
set -g @catppuccin_flavour "macchiato"


# ------------------------------------------------------------
# TMUX PLUGINS (TPM)
# ------------------------------------------------------------

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible tmux defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Seamless navigation between tmux panes and vim splits
set -g @plugin 'christoomy/tmux-navigator'

# Copy text to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Catppuccin theme implementation
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
# set -g @plugin 'catppuccin/tmux'  # alternative theme plugin

set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @plugin 'christoomy/tmux-navigator'

# ------------------------------------------------------------
# START PLUGIN MANAGER
# ------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'

